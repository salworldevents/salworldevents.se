<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SÀLWORLD EVENTS | Premium Luxury Event Planning</title>
  <meta name="description" content="SÀLWORLD EVENTS skapar exklusiva event i Sverige med elegans, kvalitet och oförglömliga upplevelser." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header" id="header">
    <div class="container header-inner">
      <a href="index.html" class="brand-logo">SW</a>

      <button class="hamburger" id="hamburger" aria-label="Öppna meny">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav" id="nav">
        <a href="#hero">Hem</a>
        <a href="about.html">Om Oss</a>
        <a href="#services">Tjänster</a>
        <a href="#salcups">SÀLCUPS</a>
        <a href="#gallery">Galleri</a>
        <a href="#contact">Kontakt</a>
      </nav>

      <div class="header-right">
        <span class="location">📍 Sverige</span>
        <button class="lang-switch">EN | SV</button>
        <a class="btn btn-gold" href="#booking">Boka Nu</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" id="hero">
      <video class="hero-video" autoplay muted loop playsinline poster="assets/hero-poster.jpg">
        <source src="assets/luxury-wedding.mp4" type="video/mp4" />
      </video>
      <div class="hero-overlay"></div>
      <div class="container hero-content">
        <h1 class="hero-title">SÀLWORLD EVENTS</h1>
        <p class="hero-subtitle">Exklusiva event med elegans, kvalitet och oförglömliga upplevelser.</p>
        <div class="hero-cta">
          <a href="about.html" class="btn btn-glass">Upptäck Mer</a>
          <a href="#booking" class="btn btn-gold">Book Event</a>
        </div>
      </div>
    </section>

    <section class="section" id="services"><div class="container"><h2 class="section-title">Tjänster</h2></div></section>
    <section class="section" id="salcups"><div class="container"><h2 class="section-title">SÀLCUPS</h2></div></section>
    <section class="section" id="gallery"><div class="container"><h2 class="section-title">Galleri</h2></div></section>
    <section class="section" id="booking"><div class="container"><h2 class="section-title">Boka Event</h2></div></section>
    <section class="section" id="contact"><div class="container"><h2 class="section-title">Kontakt</h2></div></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
